<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Mapa Prospecções</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Leaflet (mapa) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#loginBox {
  width:300px;
  margin:100px auto;
  padding:20px;
  border:1px solid #ccc;
}
#map { height: 100vh; display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>
</div>

<!-- MAPA -->
<div id="map"></div>

<script>

// =====================
// CONFIG SUPABASE
// =====================
const supabaseUrl = "https://qdnzywsgwhvicmogddrb.supabase.co/";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbnp5d3Nnd2h2aWNtb2dkZHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjk3MDksImV4cCI6MjA5ODkwNTcwOX0.YpOvi8noV-gbcIV7U_VzC9z9UAPsFmyktzrBnosBync";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

// =====================
// LOGIN
// =====================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await client.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
  } else {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("map").style.display = "block";
    iniciarMapa();
  }
}

// =====================
// MAPA
// =====================
function iniciarMapa() {
  const map = L.map('map').setView([41.5, -6.5], 7);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri'
  }).addTo(map);

 map.on('click', function(e) {

  const formHtml = `
    Nome: <input id="nome"><br><br>
    Tipo:
    <select id="tipo">
      <option value="Prospeção">Prospeção</option>
      <option value="Armadilha">Armadilha</option>
    </select><br><br>
    Observações:<br>
    <textarea id="obs"></textarea><br><br>
    <button onclick="guardarPonto(${e.latlng.lat}, ${e.latlng.lng})">
      Guardar
    </button>
  `;

  const popup = L.popup()
    .setLatLng(e.latlng)
    .setContent(formHtml)
    .openOn(map);
async function carregarPontos() {

  const { data, error } = await supabase
    .from('pontos')
    .select('*');

  if (error) {
    console.log(error);
    return;
  }

  data.forEach(p => {
    L.marker([p.latitude, p.longitude])
      .addTo(map)
      .bindPopup(p.nome);
  });
}

  async function guardarPonto(lat, lng) {

  const nome = document.getElementById("nome").value;
  const tipo = document.getElementById("tipo").value;
  const observacoes = document.getElementById("obs").value;

  const user = await supabase.auth.getUser();
  const userId = user.data.user.id;

  const { data, error } = await supabase
    .from('pontos')
    .insert([
      {
        nome: nome,
        latitude: lat,
        longitude: lng,
        observacoes: observacoes,
        criado_por: userId
      }
    ])
    .select()
    .single();

  if (error) {
    alert("Erro: " + error.message);
    return;
  }

  // criar marcador
  L.marker([lat, lng])
    .addTo(map)
    .bindPopup(nome);

  map.closePopup();
  alert("Ponto guardado!");
}


</script>

</body>
</html>
