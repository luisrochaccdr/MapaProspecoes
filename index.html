<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>

// =====================
// CONFIG SUPABASE
// =====================
const supabaseUrl = "https://qdnzywsgwhvicmogddrb.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbnp5d3Nnd2h2aWNtb2dkZHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMjk3MDksImV4cCI6MjA5ODkwNTcwOX0.YpOvi8noV-gbcIV7U_VzC9z9UAPsFmyktzrBnosBync";

// esperar que Supabase esteja disponível
if (!window.supabase) {
  console.error("Supabase não carregado! Verifica o CDN no <head>");
}

// criar client (CORRETO)
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// =====================
// LOGIN
// =====================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("msg").innerText = error.message;
    return;
  }

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("map").style.display = "block";

  iniciarMapa();
}

// =====================
// MAPA
// =====================
function iniciarMapa() {

  const map = L.map('map').setView([41.5, -6.5], 7);

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri'
  }).addTo(map);

  map.on('click', async function(e) {

    const nome = prompt("Nome do ponto:");
    if (!nome) return;

    const tipo = prompt("Tipo (Prospeção ou Armadilha):");
    if (!tipo) return;

    const observacoes = prompt("Observações (opcional):");

    const { data: userData, error: userError } = await supabase.auth.getUser();

    if (userError || !userData.user) {
      alert("Erro de login");
      return;
    }

    const userId = userData.user.id;

    const { data, error } = await supabase
      .from('pontos')
      .insert([
        {
          nome: nome,
          latitude: e.latlng.lat,
          longitude: e.latlng.lng,
          observacoes: observacoes,
          criado_por: userId
        }
      ]);

    if (error) {
      alert("Erro: " + error.message);
      return;
    }

    L.marker([e.latlng.lat, e.latlng.lng])
      .addTo(map)
      .bindPopup(nome);

    alert("Ponto criado!");
  });
}

</script>
